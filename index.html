<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Notification banner (hidden by default) -->
  <div id="notification" style="display:none;" role="alert" aria-live="polite"></div>

  <!-- Header: Balance Display -->
  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <div id="balance-display">
      <span>Total Balance:</span>
      <span id="balance-value">$0.00</span>
    </div>
  </header>

  <main>

    <!-- Input Form -->
    <section id="form-section" aria-labelledby="form-heading">
      <h2 id="form-heading">Add Transaction</h2>
      <form id="transaction-form" novalidate>

        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input
            type="text"
            id="item-name"
            name="item-name"
            maxlength="100"
            placeholder="e.g. Lunch"
            autocomplete="off"
          >
          <span class="error-msg" id="item-name-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            name="amount"
            min="0.01"
            max="999999999.99"
            step="0.01"
            placeholder="e.g. 12.50"
          >
          <span class="error-msg" id="amount-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">-- Select --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="error-msg" id="category-error" aria-live="polite"></span>
        </div>

        <button type="submit">Add Transaction</button>

      </form>
    </section>

    <!-- Transaction List -->
    <section id="list-section" aria-labelledby="list-heading">
      <h2 id="list-heading">Transactions</h2>
      <ul id="transaction-list" aria-label="Transaction list">
        <!-- List items rendered by app.js -->
      </ul>
    </section>

    <!-- Chart Container -->
    <section id="chart-section" aria-labelledby="chart-heading">
      <h2 id="chart-heading">Spending by Category</h2>
      <div id="chart-container">
        <canvas id="spending-chart" aria-label="Spending pie chart" role="img"></canvas>
        <p id="chart-empty-msg">No data to display</p>
      </div>
    </section>

  </main>

  <!-- Chart.js v4.x from jsDelivr CDN (must load before app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/app.js" defer></script>

</body>
</html>
